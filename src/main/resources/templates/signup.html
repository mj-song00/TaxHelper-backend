<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - TaxHelper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="auth-page">
<header class="auth-header">
    <a class="brand" th:href="@{/}"><span class="brand-mark">T</span><span>TaxHelper</span></a>
</header>
<main class="auth-main">
    <section class="auth-card signup-card">
        <div class="auth-copy">
            <span class="eyebrow">간단하게 시작해요</span>
            <h1>회원가입</h1>
            <p>질문 기록을 안전하게 저장하고<br>필요할 때 다시 찾아보세요.</p>
        </div>
        <form class="auth-form" th:action="@{/signup}" method="post" data-signup-form>
            <label for="email">이메일</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" placeholder="8자 이상 입력해 주세요" required>
            <label for="passwordConfirm">비밀번호 확인</label>
            <input id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" placeholder="비밀번호를 한 번 더 입력해 주세요" required>
            <p class="field-error" aria-live="polite"></p>
            <button class="button button-primary button-wide" type="submit">회원가입</button>
            <p class="auth-link">이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
        </form>
    </section>
</main>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
