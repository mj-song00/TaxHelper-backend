<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxHelper - 세금 법률 AI 상담</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body class="home-page">
<div class="app-shell" th:classappend="${loggedIn} ? ' has-sidebar' : ''">
    <aside class="sidebar" th:if="${loggedIn}">
        <a class="brand sidebar-brand" th:href="@{/}" aria-label="TaxHelper 홈">
            <span class="brand-mark">T</span><span>TaxHelper</span>
        </a>
        <button class="new-chat" type="button">
            <span aria-hidden="true">＋</span> 새로운 질문
        </button>
        <div class="history-title">최근 검색 내역</div>
        <nav class="history-list" aria-label="검색 내역">
            <button type="button">종합소득세 신고 기준</button>
            <button type="button">부가가치세 납부 기한</button>
            <button type="button">취득세 감면 조건</button>
        </nav>
        <div class="sidebar-user">
            <span class="avatar" th:text="${#strings.substring(userEmail, 0, 1).toUpperCase()}">U</span>
            <span class="user-email" th:text="${userEmail}">user@example.com</span>
        </div>
    </aside>

    <main class="main-area">
        <header class="topbar">
            <a class="brand" th:if="${!loggedIn}" th:href="@{/}" aria-label="TaxHelper 홈">
                <span class="brand-mark">T</span><span>TaxHelper</span>
            </a>
            <span class="topbar-spacer"></span>
            <nav class="auth-actions" th:if="${!loggedIn}">
                <a class="button button-ghost" th:href="@{/login}">로그인</a>
                <a class="button button-primary button-small" th:href="@{/signup}">회원가입</a>
            </nav>
            <form th:if="${loggedIn}" th:action="@{/logout}" method="post">
                <button class="button button-ghost" type="submit">로그아웃</button>
            </form>
        </header>

        <section class="hero" aria-labelledby="hero-title">
            <div class="hero-badge"><span></span> 법령과 판례를 기반으로 답변해요</div>
            <h1 id="hero-title">세금 고민, <em>TaxHelper</em>에게<br>편하게 물어보세요</h1>
            <p>복잡한 세금 문제도 관련 법령과 판례를 찾아<br>쉽고 정확하게 설명해 드립니다.</p>

            <form class="question-box" data-chat-form>
                <label class="sr-only" for="question">세금 관련 질문</label>
                <textarea id="question" name="question" rows="3" placeholder="궁금한 세금 문제를 입력해 주세요.&#10;예) 복합거래에서 주된 공급과 부수 공급을 구분하는 기준은 무엇인가요?"></textarea>
                <div class="question-footer">
                    <span class="helper-text">법률 상담이 아닌 정보 제공을 목적으로 합니다.</span>
                    <button class="send-button" type="submit" aria-label="질문 보내기">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 7-7 7 7M12 5v14"/></svg>
                    </button>
                </div>
            </form>

            <section class="answer-card" data-answer-card hidden aria-live="polite">
                <div class="answer-status" data-answer-status>
                    <span class="loading-dot"></span>
                    <span>관련 법령과 판례를 찾고 있어요</span>
                </div>
                <div class="answer-result" data-answer-result hidden>
                    <div class="answer-label">TaxHelper 답변</div>
                    <h2 data-answer-question></h2>
                    <div class="answer-content" data-answer-content></div>
                    <div class="source-list" data-source-list></div>
                </div>
            </section>

            <div class="examples">
                <span>이렇게 물어보세요</span>
                <button type="button" data-question="부가가치세 신고 기한을 알려주세요">부가가치세 신고 기한</button>
                <button type="button" data-question="취득세 감면 요건은 무엇인가요?">취득세 감면 요건</button>
                <button type="button" data-question="종합소득세 경비 인정 기준이 궁금해요">종합소득세 경비 기준</button>
            </div>
        </section>

        <footer class="site-footer">TaxHelper의 답변은 참고용이며, 중요한 세무 결정은 전문가와 상담해 주세요.</footer>
    </main>
</div>
<script th:src="@{/js/app.js(v='20260715-2')}" src="/js/app.js?v=20260715-2"></script>
</body>
</html>
